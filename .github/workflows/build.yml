name: 跨平台打包

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# 关键：默认 GITHUB_TOKEN 只有 read 权限，无法创建 Release
# 必须显式声明 contents: write 才能调用 releases API
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact_name: KeyboardWizard-windows
            ext: exe
          - os: macos-latest
            name: macOS
            artifact_name: KeyboardWizard-macos
            ext: app
          - os: ubuntu-latest
            name: Linux
            artifact_name: KeyboardWizard-linux
            ext: bin

    runs-on: ${{ matrix.os }}
    name: 构建 ${{ matrix.name }} 版本

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装系统依赖（Linux）
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-xlib scrot python3-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 打包（PyInstaller）
        run: |
          python -m PyInstaller --clean --noconfirm build.spec

      - name: 代码签名（macOS，ad-hoc + entitlements）
        if: runner.os == 'macOS'
        run: |
          # GitHub Actions 上没有 Apple Developer 证书，使用 ad-hoc 签名（-）
          # 关键：entitlements 中的 com.apple.security.cs.disable-library-validation
          # 允许加载 PyInstaller 打包的未签名 dylib（libjxl/libhwy/libbrotlidec 等）
          # 否则 AMFI 会终止进程，崩溃报告显示 bug_type 309 / trmStatus 1
          APP="dist/按键精灵.app"
          if [ ! -d "$APP" ]; then
            echo "未找到 .app，dist 目录内容："
            ls -la dist/
            exit 1
          fi
          echo "==== 签名前 ===="
          codesign -dv "$APP" 2>&1 || true
          echo "==== 执行 ad-hoc 签名（含 entitlements）===="
          codesign --deep --force --sign - \
            --options runtime \
            --entitlements entitlements.plist \
            "$APP"
          echo "==== 签名后 ===="
          codesign -dv "$APP" 2>&1 || true
          echo "==== 验证签名 ===="
          codesign --verify --verbose=4 "$APP" 2>&1 || true
          echo "==== entitlements 检查 ===="
          codesign -d --entitlements - "$APP" 2>&1 || true

      - name: 重命名产物（统一命名规范）
        shell: bash
        run: |
          set -e
          mkdir -p release
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Windows 产物是 dist/按键精灵.exe
            cp dist/*.exe release/KeyboardWizard-windows.exe 2>/dev/null || true
          elif [ "${{ runner.os }}" = "macOS" ]; then
            # macOS 产物是 dist/按键精灵.app（目录），需要打包成 zip
            cd dist && zip -r -y ../release/KeyboardWizard-macos.app.zip 按键精灵.app && cd ..
          elif [ "${{ runner.os }}" = "Linux" ]; then
            # Linux 产物是 dist/按键精灵（无后缀的可执行文件）
            cp dist/按键精灵 release/KeyboardWizard-linux 2>/dev/null || true
            chmod +x release/KeyboardWizard-linux 2>/dev/null || true
          fi
          echo "==== release 目录内容 ===="
          ls -la release/

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  # 单独的 release job：等所有平台构建完成后，下载全部产物统一发布
  # 避免矩阵多 job 并发创建同一个 release 造成冲突
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    name: 发布 Release

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: 整理产物到单一目录
        run: |
          set -e
          mkdir -p final
          # 把每个子目录里的产物平铺到 final/
          find release-assets -type f -exec cp {} final/ \;
          echo "==== 最终发布文件 ===="
          ls -la final/

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: final/*
          name: KeyboardWizard ${{ github.ref_name }}
          body: |
            ## 使用方法

            ### Windows
            1. 下载 `KeyboardWizard-windows.exe`（约 40-60 MB）
            2. 双击即可运行，无需安装 Python
            3. 如按键/截图无反应，右键 → 以管理员身份运行

            ### macOS
            1. 下载 `KeyboardWizard-macos.app.zip`（约 50-70 MB）
            2. 解压后拖入应用程序文件夹
            3. 首次运行需在「系统设置 → 隐私与安全性」中允许打开
            4. **若 .app 闪退**：先删除旧的 .app 再放入新版本（避免旧签名缓存）
            5. 需在「辅助功能」和「输入监控」中授予权限
            6. 若仍崩溃，查看 `~/Library/Application Support/KeyboardWizard/crash.log`

            ### Linux
            1. 下载 `KeyboardWizard-linux`（约 40-60 MB）
            2. 添加执行权限：`chmod +x KeyboardWizard-linux`
            3. 运行：`./KeyboardWizard-linux`
            4. 建议使用 X11 会话（Wayland 下截图可能受限制）
